name: Sanguosha CI/CD

# 触发条件
on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]  # 当推送类似 v1.0.0 的标签时触发 CD 流程
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest  # 使用 Windows 环境

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 安装 Qt 和官方匹配的 MinGW 编译器（内含兼容的 GCC 13+）
    - name: Install Qt and Compatible MinGW
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.2'  # 使用极其稳定的 6.8 LTS 版本
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw'
        tools: 'tools_mingw'   # 自动下载并配置官方 MinGW

    # 3. 配置 CMake 
    # （移除了 shell: bash，使其在默认的 pwsh 下安全运行）
    - name: Configure CMake
      run: |
        cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release "-DCMAKE_PREFIX_PATH=${{ env.QT_ROOT_DIR }}"

    # 4. 执行编译
    - name: Build Project
      run: cmake --build build --config Release --parallel

    # 5. 运行测试
    # （移除了 shell: bash，并在本地环境中运行 ctest）
    - name: Run Tests
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        cd build
        ctest --output-on-failure

    # 6. 收集并上传构建产物（仅在推送 Tag 时触发）
    - name: Upload Artifacts
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: cpp-binary-mingw
        path: build/your_executable_name.exe