name: Sanguosha CI/CD

# 触发条件
on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]  # 当推送类似 v1.0.0 的标签时触发 CD 流程
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest  # 使用 Windows 最新环境

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 安装 MSYS2 MinGW（与 Qt win64_mingw 的 ABI 一致）
    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-make

    # 3. 安装 Qt 6.8.2 (针对 MinGW 架构)
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw'

    # 4. 配置 CMake（使用 MSYS2 的 MinGW 编译器）
    - name: Configure CMake
      shell: msys2 {0}
      run: |
        cmake -S . -B build \
              -G "MSYS Makefiles" \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

    # 5. 执行编译
    - name: Build Project
      shell: msys2 {0}
      run: cmake --build build --parallel

    # 6. 运行测试
    - name: Run Tests
      shell: msys2 {0}
      run: |
        cd build
        ctest --output-on-failure

    # 7. 收集并上传构建产物（仅在推送 Tag 时触发）
    - name: Upload Artifacts
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: cpp-binary-mingw
        # 注意：使用 MinGW 生成的 Release 程序，通常直接在 build 文件夹根目录下，
        # 而不是像 MSVC 那样生成在 build/Release 目录下。
        path: build/your_executable_name.exe